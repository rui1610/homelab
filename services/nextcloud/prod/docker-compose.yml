version: '3.8'

volumes:

  vol_nextcloud_prod:
    driver: local
    name: vol_nextcloud_prod
    driver_opts:
      type: "nfs"
      o: "addr=${NAS_IP_ADDRESS},nolock,rw,soft,nfsvers=4"
      device: ":${NFS_PATH_DOCKER_VOLUMES}/nextcloud/files"

  vol_nextcloud_db_prod:
    driver: local
    name: vol_nextcloud_db_prod
    driver_opts:
      type: "nfs"
      o: "addr=${NAS_IP_ADDRESS},nolock,rw,soft,nfsvers=4"
      device: ":${NFS_PATH_DOCKER_VOLUMES}/nextcloud/db"

services:
  db:
    image: mariadb:10.6
    container_name: nextcloud_db
    hostname: nextcloud_db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    volumes:
      - vol_nextcloud_db_prod:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DEFAULT_PASSWORD}
      - MYSQL_PASSWORD=${DEFAULT_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - TZ="${TIMEZONE}"
      - PUID=${PUID}
      - PGID=${PGID}


  app:
    image: nextcloud:latest
    container_name: nextcloud_prod
    hostname: nextcloud_prod
    restart: always
    ports:
      - ${PORT_NEXTCLOUD}:80
    links:
      - db
    volumes:
      - vol_nextcloud_prod:/var/www/html
    environment:
      - MYSQL_PASSWORD=${DEFAULT_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      - TZ="${TIMEZONE}"
      - PUID=${PUID}
      - PGID=${PGID}
